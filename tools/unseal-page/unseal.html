<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, private">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>OpenClaw Unseal</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 3rem auto; padding: 0 1rem; color: #111; }
    .box { border: 1px solid #ddd; border-radius: 12px; padding: 1rem 1.25rem; }
    .challenge { font-size: 1.4rem; margin: 1rem 0; word-break: break-word; }
    input, button { font: inherit; padding: 0.75rem; width: 100%; box-sizing: border-box; margin-top: 0.75rem; }
    button { cursor: pointer; }
    .muted { color: #666; font-size: 0.95rem; }
    .status { font-weight: 700; text-transform: uppercase; }
  </style>
</head>
<body>
  <h1>OpenClaw Unseal</h1>
  <div class="box">
    <div>Status: <span class="status">__STATUS__</span></div>
    <div class="challenge">__CHALLENGE__</div>
    <div class="muted">Match the emoji with chat before entering the password.</div>
    <form id="form" autocomplete="off">
      <input type="hidden" id="token" value="__TOKEN__">
      <input id="password" name="password" type="password" autocomplete="new-password" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="Boot password">
      <button type="submit">Unseal</button>
    </form>
    <div id="msg" class="muted"></div>
  </div>
  <script>
    const form = document.getElementById('form');
    const msg = document.getElementById('msg');
    async function poll() {
      try {
        const r = await fetch('/api/challenge', { cache: 'no-store' });
        const data = await r.json();
        if (data.status === 'submitted' || data.status === 'processing') msg.textContent = 'Processing...';
        if (data.status === 'unsealed') msg.textContent = 'Unsealed.';
        if (data.status === 'failed') msg.textContent = 'Failed.';
      } catch {}
    }
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = 'Submitting...';
      const password = document.getElementById('password').value;
      const token = document.getElementById('token').value;
      const r = await fetch('/api/unseal', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        cache: 'no-store',
        body: JSON.stringify({ token, password })
      });
      const data = await r.json().catch(() => ({}));
      msg.textContent = data.ok ? 'Submitted.' : 'Failed.';
      if (data.ok) form.style.display = 'none';
    });
    setInterval(poll, 2000);
    poll();
  </script>
</body>
</html>
